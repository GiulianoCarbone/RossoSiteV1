<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual de Productos - Uso Interno | Rosso Materiales</title>
    <link href="assets/FAV.png" rel="icon">
    <link href="style.css" rel="stylesheet" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Evita el scroll en la página principal */
        }

        /* --- ESTILOS PARA EL LOGIN --- */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f0f2f5; /* Un fondo gris claro */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000; /* Asegura que esté por encima de todo */
        }
        #login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        #login-container img.logo {
            max-width: 180px;
            margin-bottom: 24px;
        }
        #login-container h2 {
            margin: 0 0 24px 0;
            color: var(--brand);
            font-size: 1.5rem;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--muted);
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        #login-button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background-color: var(--accent);
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #login-button:hover {
            background-color: #d95324;
        }
        #login-error {
            color: #d9534f;
            margin-top: 15px;
            font-weight: 600;
            height: 20px;
        }

        /* --- ESTILOS PARA EL FLIPBOOK (oculto por defecto) --- */
        #flipbook-wrapper {
            display: none; /* Oculto hasta que el login sea exitoso */
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div id="login-container">
            <img src="https://i.ibb.co/PzZscw0G/Logo-Rosso-Institucional-1.png" alt="Rosso Materiales Logo" class="logo">
            <h2>Acceso para Vendedores</h2>
            <form id="login-form">
                <div class="input-group">
                    <label for="nombre">Nombre y Apellido</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="input-group">
                    <label for="dni">Documento</label>
                    <input type="password" id="dni" required> </div>
                <button type="submit" id="login-button">Ingresar</button>
                <div id="login-error"></div>
            </form>
        </div>
    </div>
    
    <div id="flipbook-wrapper">
        <iframe allowfullscreen="allowfullscreen" allow="clipboard-write" scrolling="no" class="fp-iframe" src="https://heyzine.com/flip-book/81dcf4c2d3.html"></iframe>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- ¡ACCIÓN REQUERIDA! ---
            // Modificá esta lista con los nombres y DNI reales de tus vendedores.
            // Podés agregar tantos como necesites.
            const vendedoresAutorizados = [
                { nombre: "Juan Perez", dni: "12345678" },
                { nombre: "Maria Garcia", dni: "87654321" },
                { nombre: "Pedro Gonzalez", dni: "11223344" }
                // { nombre: "Otro Vendedor", dni: "OTRODNI" },
            ];

            const loginForm = document.getElementById('login-form');
            const loginOverlay = document.getElementById('login-overlay');
            const flipbookWrapper = document.getElementById('flipbook-wrapper');
            const errorMessage = document.getElementById('login-error');

            loginForm.addEventListener('submit', function(event) {
                event.preventDefault(); // Evita que la página se recargue

                const nombreInput = document.getElementById('nombre').value.trim();
                const dniInput = document.getElementById('dni').value.trim();

                // Busca si existe un vendedor con ese nombre y DNI
                const esValido = vendedoresAutorizados.some(vendedor => 
                    vendedor.nombre.toLowerCase() === nombreInput.toLowerCase() && 
                    vendedor.dni === dniInput
                );

                if (esValido) {
                    // Si es válido, oculta el login y muestra el flipbook
                    loginOverlay.style.display = 'none';
                    flipbookWrapper.style.display = 'block';
                } else {
                    // Si no es válido, muestra un error
                    errorMessage.textContent = 'Nombre o DNI incorrecto.';
                    // Opcional: limpiar el campo de DNI
                    document.getElementById('dni').value = '';
                }
            });
        });
    </script>
</body>
</html>
