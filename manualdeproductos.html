<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual de Productos - Uso Interno | Rosso Materiales</title>
    <link href="assets/FAV.png" rel="icon">
    <link href="style.css" rel="stylesheet" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Eliminamos overflow: hidden; para permitir el scroll */
        }

        /* Hacemos que el body sea un contenedor flexible */
        body {
            display: flex;
            flex-direction: column;
        }
        
        /* El header se mantiene igual, ya es fijo por style.css */

        .flipbook-container {
            /* El contenedor crece para ocupar el espacio restante */
            flex-grow: 1; 
            /* Agregamos el padding para empujar el contenido debajo del header */
            padding-top: var(--header-h); 
            box-sizing: border-box;
            /* Hacemos que el contenedor sea el que controle el scroll si el iframe es muy grande */
            overflow: auto; 
            -webkit-overflow-scrolling: touch; /* Mejora el scroll en iOS */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block; /* Asegura que no haya espacios extra */
        }
    </style>
</head>
<body>
    <header class="main-header" role="banner">
        <nav class="main-nav container" aria-label="Primaria">
            <a href="/" class="logo" aria-label="Ir al inicio">
                <img src="https://i.ibb.co/PzZscw0G/Logo-Rosso-Institucional-1.png" alt="Rosso Materiales" class="logo-image" />
            </a>
            <div class="nav-links" id="nav-links">
                <a href="https://rossomateriales.netlify.app"><i class="fa-solid fa-tags"></i> Promociones</a>
                <a href="https://catalogo.rossomateriales.site"><i class="fa-solid fa-book-open"></i> Catálogo</a>
                <a href="/sucursales"><i class="fa-solid fa-map-location-dot"></i> Sucursales</a>
                <a href="/nosotros"><i class="fa-solid fa-users"></i> Nosotros</a>
                <div class="dropdown">
                    <a href="#" class="dropdown-toggle"><i class="fa-solid fa-wrench"></i> Utilidades</a>
                    <div class="dropdown-menu">
                        <a href="/calculadora">Calculá los m²</a>
                        <a href="/checklist">Checklist de Materiales</a>
                        <a href="/glosario">Glosario</a>
                    </div>
                </div>
            </div>
            <button id="mobile-menu-button" class="mobile-menu-btn" aria-controls="mobile-menu" aria-expanded="false" aria-label="Abrir menú">
                <svg class="menu-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                </svg>
            </button>
            <div id="mobile-menu" class="mobile-menu" role="dialog" aria-modal="true" aria-label="Menú"></div>
        </nav>
    </header>

    <main class="flipbook-container">
        <iframe allowfullscreen="allowfullscreen" allow="clipboard-write" scrolling="no" class="fp-iframe" src="https://heyzine.com/flip-book/81dcf4c2d3.html"></iframe>
    </main>
 
    <script src="script.js"></script>
</body>
</html>
