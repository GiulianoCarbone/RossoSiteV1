<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual de Productos - Uso Interno | Rosso Materiales</title>
    <link href="assets/FAV.png" rel="icon">
    <link href="style.css" rel="stylesheet" />
    <style>
        /* CSS para posicionar el flipbook correctamente */
        body, html {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Evita barras de scroll */
        }

        .flipbook-container {
            /* Contenedor que ocupará el espacio debajo del header */
            padding-top: var(--header-h); /* Empuja el contenido hacia abajo con la altura del header (110px) */
            height: 100vh; /* Ocupa el 100% de la altura de la vista */
            box-sizing: border-box; /* Asegura que el padding no sume a la altura */
        }

        iframe {
            /* Hacemos que el iframe llene el contenedor */
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
       <header class="main-header" role="banner">
      <nav class="main-nav container" aria-label="Primaria">
        <a href="/" class="logo" aria-label="Ir al inicio">
          <img
            src="https://i.ibb.co/PzZscw0G/Logo-Rosso-Institucional-1.png"
            alt="Rosso Materiales"
            class="logo-image"
          />
        </a>
        <div class="nav-links" id="nav-links">
          <a href="https://rossomateriales.netlify.app"
            ><i class="fa-solid fa-tags"></i> Promociones</a
          >
          <a href="https://catalogo.rossomateriales.site"
            ><i class="fa-solid fa-book-open"></i> Catálogo</a
          >
          <a href="/sucursales"
            ><i class="fa-solid fa-map-location-dot"></i> Sucursales</a
          >
          <a href="/nosotros"><i class="fa-solid fa-users"></i> Nosotros</a>
          <div class="dropdown">
            <a href="#" class="dropdown-toggle"
              ><i class="fa-solid fa-wrench"></i> Utilidades</a
            >
            <div class="dropdown-menu">
              <a href="/calculadora">Calculá los m²</a>
              <a href="/checklist">Checklist de Materiales</a>
              <a href="/glosario">Glosario</a>
            </div>
          </div>
        </div>

      
        
      </nav>
    </header>

    <div class="flipbook-container">
        <iframe allowfullscreen="allowfullscreen" allow="clipboard-write" scrolling="no" class="fp-iframe" src="https://heyzine.com/flip-book/81dcf4c2d3.html"></iframe>
    </div>

</body>
</html>
