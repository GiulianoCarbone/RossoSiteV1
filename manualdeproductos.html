<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual de Productos - Uso Interno | Rosso Materiales</title>
    <link href="assets/FAV.png" rel="icon">
    <link href="style.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            background-color: #f4f7f6; /* Fondo consistente con el panel */
        }
        
        /* --- Estilos del Login --- */
        #login-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 2000; 
        }
        #login-container { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
        }
        #login-container img.logo { max-width: 180px; margin-bottom: 24px; }
        #login-container h2 { margin: 0 0 24px 0; color: var(--brand); font-size: 1.5rem; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--muted); }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        #login-button { width: 100%; padding: 14px; border: none; border-radius: 8px; background-color: var(--accent); color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        #login-error { color: #d9534f; margin-top: 15px; font-weight: 600; height: 20px; }

        /* Contenedor del Manual (Iframe) */
        #manual-wrapper {
            display: none; /* Oculto por defecto */
            flex-grow: 1; 
            padding-top: var(--header-h); 
            box-sizing: border-box;
            overflow: auto; 
            -webkit-overflow-scrolling: touch;
        }
        
        .flipbook-container {
             flex-grow: 1;
             display: flex;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div id="login-container">
            <img src="https://i.ibb.co/PzZscw0G/Logo-Rosso-Institucional-1.png" alt="Rosso Materiales Logo" class="logo">
            <h2>Acceso al Manual de Productos</h2>
            <form id="login-form">
                <div class="input-group">
                    <label for="nombre">Nombre y Apellido</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="input-group">
                    <label for="dni">Documento</label>
                    <input type="password" id="dni" required>
                </div>
                <button type="submit" id="login-button">Ingresar</button>
                <div id="login-error"></div>
            </form>
        </div>
    </div>

    <div id="manual-wrapper">
        <header class="main-header" role="banner">
            <nav class="main-nav container" aria-label="Primaria">
                <a href="index.html" class="logo" aria-label="Ir al inicio">
                    <img src="https://i.ibb.co/PzZscw0G/Logo-Rosso-Institucional-1.png" alt="Rosso Materiales" class="logo-image" />
                </a>
                
            </nav>
        </header>
        
        <main class="flipbook-container">
            <iframe allowfullscreen="allowfullscreen" allow="clipboard-write" scrolling="no" class="fp-iframe" src="https://heyzine.com/flip-book/81dcf4c2d3.html"></iframe>
        </main>
    </div>
 
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Mismos vendedores que en el panel para consistencia
        const vendedoresAutorizados = [
            { nombre: "Juan Perez", dni: "12345678" },
            { nombre: "Maria Garcia", dni: "87654321" },
        ];
        
        const loginOverlay = document.getElementById('login-overlay');
        const manualWrapper = document.getElementById('manual-wrapper');
        const loginForm = document.getElementById('login-form');

        // --- Lógica de Acceso Condicional ---
        function checkAccess() {
            const loggedInUserName = sessionStorage.getItem('vendedorLogueado');
            if (loggedInUserName) {
                // Si hay una sesión iniciada, muestra el manual y oculta el login
                loginOverlay.style.display = 'none';
                manualWrapper.style.display = 'flex';
                manualWrapper.style.flexDirection = 'column';
                manualWrapper.style.height = '100vh';
            } else {
                // Si NO hay sesión, muestra el login
                loginOverlay.style.display = 'flex';
                manualWrapper.style.display = 'none';
            }
        }
        
        // Ejecutar la verificación al cargar la página
        checkAccess();

        // --- Manejo del Formulario de Login ---
        if(loginForm) {
            loginForm.addEventListener('submit', function(event) {
                event.preventDefault();
                const nombreInput = document.getElementById('nombre').value.trim();
                const dniInput = document.getElementById('dni').value.trim();
                const user = vendedoresAutorizados.find(v => 
                    v.nombre.toLowerCase() === nombreInput.toLowerCase() && 
                    v.dni === dniInput
                );

                if (user) {
                    // Si las credenciales son correctas, guardamos la sesión
                    sessionStorage.setItem('vendedorLogueado', user.nombre);
                    // Volvemos a verificar el acceso (ahora debería mostrar el manual)
                    checkAccess();
                } else {
                    document.getElementById('login-error').textContent = 'Nombre o DNI incorrecto.';
                }
            });
        }
    });
    </script>
    <script src="script.js"></script>
</body>
</html>
